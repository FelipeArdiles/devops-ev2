services:
  mysql:
    image: mysql:8
    container_name: devops-u2-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - devops-u2-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-ventas:
    build:
      context: ./backend/ventas
    image: devops-u2-backend-ventas:1.0
    container_name: devops-u2-backend-ventas
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_ENDPOINT: mysql
      DB_NAME: ${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - devops-u2-net

  backend-despachos:
    build:
      context: ./backend/despachos
    image: devops-u2-backend-despachos:1.0
    container_name: devops-u2-backend-despachos
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_ENDPOINT: mysql
      DB_NAME: ${DB_NAME}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - devops-u2-net

  frontend:
    build:
      context: ./frontend
    image: devops-u2-frontend:1.0
    container_name: devops-u2-frontend
    environment:
      NGINX_COMPOSE_MODE: "1"
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    depends_on:
      - backend-ventas
      - backend-despachos
    networks:
      - devops-u2-net

networks:
  devops-u2-net:
    driver: bridge
    name: devops-u2-net

volumes:
  mysql_data:
    name: devops-u2-mysql-data
